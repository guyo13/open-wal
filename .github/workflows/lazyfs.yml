name: LazyFS gate

# The M3 power-loss gate (`tests/lazyfs_gate.rs`, §14.4b + §14.4g) runs the WAL
# against a real LazyFS/FUSE mount and injects `clear-cache` power losses. It is
# heavier than the main `ci.yml` (it builds + mounts a FUSE filesystem), so it
# lives in its own workflow and only runs when the code it covers changes.
#
# Currently INFORMATIONAL: the "Run the gate" step is `continue-on-error`, so a
# hosted-runner FUSE hiccup cannot block a merge. Once it has proven stable on
# ubuntu-latest, make it required by removing `continue-on-error` from that step
# (and adding this job to branch protection).

on:
  push:
    branches: [main]
    paths:
      - "src/recovery.rs"
      - "src/segment.rs"
      - "src/wal.rs"
      - "src/record.rs"
      - "tests/lazyfs_gate.rs"
      - "scripts/lazyfs-gate.sh"
      - ".github/workflows/lazyfs.yml"
      - "Cargo.toml"
  pull_request:
    paths:
      - "src/recovery.rs"
      - "src/segment.rs"
      - "src/wal.rs"
      - "src/record.rs"
      - "tests/lazyfs_gate.rs"
      - "scripts/lazyfs-gate.sh"
      - ".github/workflows/lazyfs.yml"
      - "Cargo.toml"
  workflow_dispatch:

# A hung FUSE daemon must not pin a stuck run; cancel superseded ones.
concurrency:
  group: lazyfs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: power-loss gate (LazyFS)
    runs-on: ubuntu-latest
    # Bound the whole job so a wedged mount can't run to the 6h default.
    timeout-minutes: 20
    env:
      # Keep LAZYFS_REF in sync with the script's default; the cache key pins it.
      # LAZYFS_SRC/LAZYFS_WORK are set from $RUNNER_TEMP in the first step — the
      # `runner` context is NOT available in job-level `env`, only inside steps.
      LAZYFS_REF: 045a0b3a1126725e693934e29d3ba15e08cc39ec
    steps:
      - uses: actions/checkout@v4

      - name: Configure LazyFS paths
        run: |
          # $RUNNER_TEMP is a stable absolute path, so the built LazyFS tree's
          # build-dir rpath stays valid across cache save/restore.
          echo "LAZYFS_SRC=$RUNNER_TEMP/lazyfs-src" >> "$GITHUB_ENV"
          echo "LAZYFS_WORK=$RUNNER_TEMP/lazyfs-work" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install FUSE + build deps
        run: scripts/lazyfs-gate.sh deps

      - name: Prepare FUSE device
        run: |
          sudo modprobe fuse || true
          sudo chmod 666 /dev/fuse || true

      # Cache the built LazyFS tree (binary + libpcache.so) keyed on the pinned
      # commit, so a bump rebuilds and an unchanged ref restores instantly.
      - name: Cache LazyFS build
        uses: actions/cache@v4
        with:
          path: ${{ env.LAZYFS_SRC }}
          key: lazyfs-${{ runner.os }}-${{ env.LAZYFS_REF }}

      - name: Build LazyFS
        run: scripts/lazyfs-gate.sh build

      - name: Run the gate (informational until proven stable)
        id: gate
        continue-on-error: true
        run: |
          scripts/lazyfs-gate.sh mount
          scripts/lazyfs-gate.sh run

      - name: LazyFS log (on gate failure)
        if: steps.gate.outcome == 'failure'
        run: |
          echo "==== ${LAZYFS_WORK}/lazyfs.log ===="
          cat "${LAZYFS_WORK}/lazyfs.log" 2>/dev/null || echo "(no log)"

      - name: Unmount
        if: always()
        run: scripts/lazyfs-gate.sh unmount
