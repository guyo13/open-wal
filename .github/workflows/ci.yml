name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --all-targets --verbose
      - name: test
        run: cargo test --verbose
      # Per-PR perf coverage is the zero-alloc gate (a normal `cargo test`) plus a
      # compile-only build of the criterion benches so they cannot bitrot. The
      # benches themselves are NIGHTLY/manual (§14.11, `bench.yml`) — too slow and
      # too noisy to run on every PR.
      - name: bench (compile only)
        run: cargo bench --no-run

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin to the declared rust-version so the MSRV claim is verified, not just
      # asserted. Uses the committed Cargo.lock (--locked) for a faithful check.
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: check
        run: cargo check --all-targets --locked
