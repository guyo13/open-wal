name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --all-targets --verbose
      - name: test
        run: cargo test --verbose
      # Per-PR perf coverage is the zero-alloc gate (a normal `cargo test`) plus a
      # compile-only build of the criterion benches so they cannot bitrot. The
      # benches themselves are NIGHTLY/manual (§14.11, `bench.yml`) — too slow and
      # too noisy to run on every PR.
      - name: bench (compile only)
        run: cargo bench --no-run

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin to the declared rust-version so the MSRV claim is verified, not just
      # asserted. Uses the committed Cargo.lock (--locked) for a faithful check.
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: check
        run: cargo check --all-targets --locked

  fuzz-smoke:
    # M9 F1 (§14.5): a SHORT per-PR smoke of the recovery-parser fuzz target.
    # This lane is real and BLOCKING — a reproducible crash here is a genuine D11
    # bug and must red the PR (not advisory). It is distinct from the time-boxed
    # nightly fuzz lane (fuzz.yml) and from any H1 sign-off: M9 fuzz findings gate
    # M9-relevant PRs; they never red an H1 dispatch run. The full N-CPU-hour
    # §14.13 release gate runs on a dedicated runner, not here.
    name: F1 fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Pin the gnu target explicitly: some cargo-fuzz builds default to the musl
      # target on Linux, where the static libc is incompatible with the sanitizer
      # (and musl std is not installed) — gnu has full ASan support.
      - name: Build F1
        run: cargo +nightly fuzz build recovery --target x86_64-unknown-linux-gnu
      - name: Smoke run (bounded; a crash reds the PR)
        run: cargo +nightly fuzz run recovery --target x86_64-unknown-linux-gnu -- -runs=20000 -rss_limit_mb=4096

  dirfsync-presence:
    # M8 §14.4d Tier 1 (PRIMARY): the deterministic, FS-independent regression
    # guard for the roll-time directory fsync (§7.4 step 5). It straces the roll
    # path and asserts the correct build issues a directory `fsync` per roll while
    # the `inject_no_dir_fsync` build does not — the syscall-presence analogue of
    # H4's F_FULLFSYNC check. Unlike the behavioral power-loss control (FS-dependent,
    # lives on ext2 in the dm-flakey gate), this fails immediately and every time
    # someone deletes fsync_dir, so it belongs on every PR. Needs only strace — no
    # dm-flakey, no privileges.
    name: §14.4d dir-fsync presence (strace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install strace
        run: sudo apt-get update -y && sudo apt-get install -y strace
      - name: dir-fsync presence (correct issues it per roll; inject does not)
        run: scripts/m8/dirfsync-presence.sh
