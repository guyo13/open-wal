name: M8 durability gates

# M8 (§14.8) splits sharply into "runs anywhere" and "needs real hardware":
#
#   * The H2 vacuous-pass guard and the H3 §12 poison STATE MACHINE (LD_PRELOAD
#     EIO shim) run on any Linux host and are REAL gates here — in particular the
#     gate's anti-vacuous "injection actually fired" assertion is a HARD failure
#     (red), never continue-on-error: "the shim didn't fire" means the test
#     verified nothing, which must go red even though the job is otherwise about
#     environment availability.
#
#   * The H3 PHYSICAL gate (dm-flakey) and §14.4d now run on their own nightly/manual
#     workflow (.github/workflows/m8-dmflakey.yml) — hosted ubuntu VMs CAN reach
#     dm-flakey, so those gates are real CI signal there (best-effort + loud skip if a
#     given runner image lacks the target). H4 Half A runs on macOS CI
#     (.github/workflows/m8-macos.yml). H1 power-pull still needs a cuttable target and
#     stays OWNER-RUN (docs/m8-runbook.md). The note job below just points at these.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/fault/**"
      - "tests/fsync_fault_gate.rs"
      - "scripts/m8/**"
      - ".github/workflows/m8.yml"
      - "Cargo.toml"
  pull_request:
    paths:
      - "src/**"
      - "tests/fault/**"
      - "tests/fsync_fault_gate.rs"
      - "scripts/m8/**"
      - ".github/workflows/m8.yml"
      - "Cargo.toml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # REAL gates — these block the merge.
  runnable:
    name: H2 guard + H3 §12 poison gate (real)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # H2: the deny-by-default storage durability guard. The runner workspace must
      # be a real durable block FS; tmpfs/overlay would (correctly) fail this.
      - name: H2 storage durability guard
        run: scripts/m8/storage-check.sh classify .

      # H3 §12 poison state machine. The shim must compile, intercept the WAL's
      # libc fdatasync, and the gate's injection-fired guard must hold — HARD fail.
      - name: H3 §12 poison gate (LD_PRELOAD EIO shim)
        run: scripts/m8/fsync-fault.sh run

  # INFORMATIONAL pointer — where the other M8 gates live now. Does not gate.
  physical-note:
    name: M8 physical gates — where they run (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Note
        run: |
          echo "H3-physical (#16) and §14.4d (#17) run on dm-flakey via the"
          echo "'M8 dm-flakey gates' workflow (.github/workflows/m8-dmflakey.yml),"
          echo "nightly + manual (best-effort + loud skip if a runner lacks dm-flakey)."
          echo "H4 Half A runs on macOS CI (.github/workflows/m8-macos.yml)."
          echo "H1 power-pull (#18) is the only gate that still needs a cuttable target —"
          echo "it stays OWNER-RUN on real hardware (docs/m8-runbook.md)."
